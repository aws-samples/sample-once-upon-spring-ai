# MCP Server Configuration
spring.application.name=dice-mcp-server
spring.ai.mcp.server.name=dice-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.instructions=Dice Rolling MCP Server - provides dice rolling tools and prompt templates for tabletop game mechanics
spring.ai.mcp.server.capabilities.prompt=true

# Server port
server.port=8080

# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO
